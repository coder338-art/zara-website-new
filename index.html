<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ======= DESKTOP (side by side) ======= */
  .page {
    width: 100%;
    max-width: 860px;
    padding: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .headline {
    font-size: clamp(22px, 2.8vw, 36px);
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #111;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .subtext {
    font-size: 14px;
    line-height: 1.55;
    color: #222;
    font-style: italic;
    margin-bottom: 18px;
    text-decoration: none;
    display: block;
  }
  .subtext:hover { text-decoration: underline; }
  .subtext strong { font-style: normal; font-weight: 700; }

  .steps {
    list-style: disc;
    padding-left: 18px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 28px;
  }
  .steps li { font-size: 14px; color: #111; line-height: 1.4; }
